<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人言论档案</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7f8;color:#172026}
    *{box-sizing:border-box}body{margin:0}.shell{width:min(980px,calc(100% - 28px));margin:0 auto;padding:24px 0 40px}
    header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:16px}h1{margin:0 0 6px;font-size:28px}p{margin:0;color:#66747c}.toolbar{position:sticky;top:0;z-index:2;display:grid;grid-template-columns:minmax(240px,1fr) auto auto;gap:10px;border:1px solid #d9e0e3;border-radius:8px;background:#fff;padding:12px;box-shadow:0 6px 22px rgb(23 32 38 / 8%)}input{width:100%;min-height:38px;border:1px solid #cfd8dc;border-radius:6px;padding:7px 10px;font:inherit}a,button{display:inline-flex;align-items:center;justify-content:center;min-height:38px;border:1px solid #1b6b67;border-radius:6px;background:#fff;color:#1b6b67;text-decoration:none;font:inherit;font-weight:650;padding:0 12px;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0}.stat{border:1px solid #d9e0e3;border-radius:8px;background:#fff;padding:10px}.stat strong{display:block;font-size:22px}.stat span{color:#66747c;font-size:12px}.keywords{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}.keywords span{border:1px solid #d9e0e3;border-radius:999px;background:#fff;padding:3px 8px;font-size:12px}.list{display:grid;gap:10px;margin-top:12px}.day{justify-self:center;border:1px solid #d9e0e3;border-radius:999px;background:#fff;color:#66747c;font-size:12px;padding:5px 10px;margin:8px 0}.msg{display:grid;grid-template-columns:40px minmax(0,1fr);gap:10px}.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#dfe7eb}.avatar-fallback{display:grid;place-items:center;color:#60727b;font-weight:750}.head{color:#66747c;font-size:12px;margin-bottom:4px}.head strong{color:#172026;margin-right:6px}.bubble{width:fit-content;max-width:min(760px,100%);border:1px solid #d9e0e3;border-radius:8px;background:#fff;padding:9px 11px;box-shadow:0 1px 2px rgb(23 32 38 / 6%)}.manual .bubble{border-color:#d9c27a;background:#fff8df}.evidence{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;color:#6f5b1b;font-size:12px}.evidence strong,.evidence span{border:1px solid #ead994;border-radius:999px;background:#fff3bf;padding:2px 7px}.text{white-space:normal;overflow-wrap:anywhere;line-height:1.55}.files{display:grid;gap:8px;margin-top:8px}.files img{max-width:min(440px,100%);max-height:540px;border:1px solid #d9e0e3;border-radius:6px;object-fit:contain;background:#f8fafb}.empty{text-align:center;color:#66747c;padding:36px 0}@media(max-width:720px){header,.toolbar{grid-template-columns:1fr;flex-direction:column}.stats{grid-template-columns:1fr 1fr}.msg{grid-template-columns:32px minmax(0,1fr)}.avatar{width:32px;height:32px}}
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div><h1 id="title">个人言论档案</h1><p id="subtitle">加载中...</p></div>
      <a href="./summary.md" target="_blank" rel="noreferrer">摘要 Markdown</a>
    </header>
    <section class="toolbar">
      <input id="search" type="search" placeholder="搜索该用户发言、OCR、文件名、时间" />
      <button id="clear" type="button">清除</button>
      <a href="./messages.json" target="_blank" rel="noreferrer">JSON</a>
    </section>
    <section class="stats" id="stats"></section>
    <section class="keywords" id="keywords"></section>
    <p id="status"></p>
    <section class="list" id="list"></section>
  </main>
  <script>
  const rootPrefix = location.pathname.split("/people/")[0] + "/";
  const state = { profile:null, messages:[], filtered:[], limit:300 };
  const $ = (id) => document.getElementById(id);
  const esc = (v) => String(v ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
  const asset = (url) => {
    if (!url) return "";
    if (url.startsWith("data:") || /^https?:/.test(url)) return url;
    if (url.startsWith("/archive-media/")) return rootPrefix + url.split("/archive-media/").pop().split("/").slice(1).join("/");
    if (url.startsWith("/")) return rootPrefix + url.slice(1);
    return rootPrefix + url.replace(/^\.\.\//, "");
  };
  const display = (u) => !u ? "未知用户" : ((u.name || u.username || u.id) + (u.host ? "@" + u.host : ""));
  const userName = (u) => !u?.username ? "" : (u.host ? "@" + u.username + "@" + u.host : "@" + u.username);
  const text = (m) => [m.text, m.evidence?.ocrText, m.evidence?.sourceText, m.evidence?.sourceUserName, m.evidence?.speakerName, m.evidence?.speakerUsername, m.evidence?.speakerMatchedUserUuid, m.evidence?.attribution, ...(m.files||[]).map(f=>f.name||"")].filter(Boolean).join("\n");
  const matches = (m,q) => !q || [text(m), m.createdAt, m.date, m.time, m.id, m.evidence?.timeSource].join("\n").toLowerCase().includes(q.toLowerCase());
  const imgSrc = (f) => asset(f.thumbnailLocalUrl || f.localUrl || f.thumbnailUrl || f.url || "");
  const attributionLabel = (v) => ({ uploader:"按上传者", speaker:"按截图发言人", both:"上传者+截图发言人", "speaker-from-both":"截图发言人归属", "uploader-or-speaker":"上传者或截图发言人" }[v] || v || "");
  function evidenceMeta(m) {
    const e = m.evidence || {};
    const items = [
      m.manual ? "<strong>截图证据补录</strong>" : "",
      e.speakerName ? "<span>截图发言人 " + esc(e.speakerName) + (e.speakerUsername ? " @" + esc(e.speakerUsername) : "") + "</span>" : "",
      e.sourceUserName ? "<span>原上传者 " + esc(e.sourceUserName) + "</span>" : "",
      e.attribution ? "<span>归属 " + esc(attributionLabel(e.attribution)) + "</span>" : "",
      e.speakerConfidence ? "<span>发言人置信度 " + esc(e.speakerConfidence) + "</span>" : "",
      e.timeSource ? "<span>时间来源 " + esc(e.timeSource) + "</span>" : "",
      e.confidence ? "<span>时间置信度 " + esc(e.confidence) + "</span>" : "",
      e.duplicateOf ? "<span>重复图</span>" : ""
    ].filter(Boolean);
    return items.length ? '<div class="evidence">' + items.join("") + "</div>" : "";
  }
  function render() {
    const list = $("list");
    const messages = state.filtered.slice(0,state.limit);
    $("status").textContent = "匹配 " + state.filtered.length + " / " + state.messages.length + " 条，已渲染 " + messages.length + " 条";
    if (!messages.length) { list.innerHTML = '<div class="empty">没有匹配发言。</div>'; return; }
    let prev = "";
    list.innerHTML = messages.map(m => {
      const day = m.date || String(m.createdAt).slice(0,10);
      const divider = day !== prev ? '<div class="day">' + esc(day) + '</div>' : '';
      prev = day;
      const u = m.user || state.profile.user;
      const avatar = asset(u?.avatarLocalUrl || u?.avatarUrl || "");
      const avatarHtml = avatar ? '<img class="avatar" src="'+esc(avatar)+'" alt="" loading="lazy">' : '<div class="avatar avatar-fallback">'+esc((u?.name||u?.username||"?").slice(0,1))+'</div>';
      const files = (m.files||[]).map(f => f.isImage && imgSrc(f) ? '<a href="'+esc(asset(f.localUrl||f.url))+'" target="_blank"><img src="'+esc(imgSrc(f))+'" alt="'+esc(f.name||"图片")+'" loading="lazy"></a>' : '<a href="'+esc(asset(f.localUrl||f.url)||"#")+'" target="_blank">'+esc(f.name||f.id||"附件")+'</a>').join("");
      return divider + '<article class="msg '+(m.manual?'manual':'')+'">'+avatarHtml+'<div><div class="head"><strong>'+esc(display(u))+'</strong><span>'+esc(userName(u))+'</span> <time>'+esc(new Date(m.createdAt).toLocaleString("zh-CN",{hour12:false}))+'</time></div><div class="bubble">'+evidenceMeta(m)+'<div class="text">'+esc(m.text||"").replace(/\n/g,"<br>")+'</div>'+(files?'<div class="files">'+files+'</div>':'')+'</div></div></article>';
    }).join("");
  }
  function apply() { state.filtered = state.messages.filter(m => matches(m, $("search").value.trim())); state.limit = 300; render(); }
  Promise.all([fetch("./profile.json").then(r=>r.json()), fetch("./messages.json").then(r=>r.json())]).then(([profile,messages]) => {
    state.profile = profile; state.messages = messages;
    $("title").textContent = display(profile.user);
    $("subtitle").textContent = "消息 " + profile.stats.messageCount + " 条 | 截图补录 " + profile.stats.manualCount + " 条 | " + (profile.stats.firstAt || "?") + " 至 " + (profile.stats.lastAt || "?");
    $("stats").innerHTML = [["消息",profile.stats.messageCount],["图片",profile.stats.imageCount],["附件",profile.stats.fileCount],["字符",profile.stats.characterCount]].map(([k,v])=>'<div class="stat"><strong>'+esc(v)+'</strong><span>'+esc(k)+'</span></div>').join("");
    $("keywords").innerHTML = (profile.keywords||[]).slice(0,40).map(k=>'<span>'+esc(k.keyword)+' '+k.count+'</span>').join("");
    apply();
  }).catch(e => { $("status").textContent = e.message; });
  $("search").addEventListener("input", () => { clearTimeout($("search")._t); $("search")._t = setTimeout(apply, 160); });
  $("clear").addEventListener("click", () => { $("search").value = ""; apply(); });
  window.addEventListener("scroll", () => { if (document.documentElement.scrollHeight - scrollY - innerHeight < 900 && state.limit < state.filtered.length) { state.limit += 300; render(); } }, { passive:true });
  </script>
</body>
</html>
