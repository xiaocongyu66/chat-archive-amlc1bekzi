<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>用户言论索引</title>
<style>:root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7f8;color:#172026}body{margin:0}.shell{width:min(980px,calc(100% - 28px));margin:0 auto;padding:24px 0 40px}h1{margin:0 0 12px}p{color:#66747c;margin:0 0 12px}input{width:100%;min-height:40px;border:1px solid #cfd8dc;border-radius:6px;padding:8px 10px;font:inherit}.list{display:grid;gap:8px;margin-top:12px}.user{display:grid;grid-template-columns:40px minmax(0,1fr) auto;gap:10px;align-items:center;border:1px solid #d9e0e3;border-radius:8px;background:#fff;padding:10px;color:inherit;text-decoration:none}.user.pending{opacity:.74}.user img,.avatar{width:40px;height:40px;border-radius:50%;background:#dfe7eb;object-fit:cover}.avatar{display:grid;place-items:center;color:#60727b;font-weight:750}.meta strong{display:block}.meta span{display:block;color:#66747c;font-size:12px}.count{color:#435059;font-weight:750;text-align:right}.badge{display:inline-block;margin-left:6px;border:1px solid #d9e0e3;border-radius:999px;padding:1px 6px;color:#66747c;font-size:11px}</style></head>
<body><main class="shell"><h1>用户言论索引</h1><input id="q" type="search" placeholder="搜索昵称、username、uuid"><section class="list" id="list"></section></main>
<script>
const esc = v => String(v ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
const asset = url => !url ? "" : url.startsWith("/archive-media/") ? "../" + url.split("/archive-media/").pop().split("/").slice(1).join("/") : url;
const display = u => !u ? "未知用户" : ((u.name || u.username || u.id) + (u.host ? "@" + u.host : ""));
let people = [];
function render() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const rows = people.filter(p => !q || [display(p.user), p.user?.username, p.user?.id, p.uuid].join("\n").toLowerCase().includes(q)).slice(0,500);
  document.getElementById("list").innerHTML = rows.map(p => {
    const u = p.user || {};
    const av = asset(u.avatarLocalUrl || u.avatarUrl || "");
    const inner = (av?'<img src="'+esc(av)+'" alt="">':'<div class="avatar">'+esc((u.name||u.username||"?").slice(0,1))+'</div>')+'<div class="meta"><strong>'+esc(display(u))+(p.generated?'<span class="badge">已生成</span>':'<span class="badge">未生成</span>')+'</strong><span>'+esc((u.username?"@"+u.username:"") + " " + p.uuid)+'</span></div><div class="count">'+p.messageCount+'</div>';
    return p.generated ? '<a class="user" href="./'+esc(p.path)+'">'+inner+'</a>' : '<div class="user pending">'+inner+'</div>';
  }).join("");
}
fetch("./index.json").then(r=>r.json()).then(data=>{people=data.people||[]; render();});
document.getElementById("q").addEventListener("input", render);
</script></body></html>
